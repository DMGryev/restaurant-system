version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: restaurant_db
    environment:
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_pass
      POSTGRES_DB: restaurant_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_user -d restaurant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: restaurant_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://restaurant_user:restaurant_pass@db:5432/restaurant_db
      DATABASE_URL_SYNC: postgresql://restaurant_user:restaurant_pass@db:5432/restaurant_db
      SECRET_KEY: super-secret-key-change-in-production-1234567890
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata: